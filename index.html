<!DOCTYPE html>
<html>
<head>
    <title>My To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
            color: #cdd6f4;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #89b4fa, #cba6f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.5;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 520px;
            backdrop-filter: blur(10px);
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(255,255,255,0.07);
            color: #cdd6f4;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            border-color: #89b4fa;
        }

        .options-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input[type="date"], select {
            flex: 1;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(255,255,255,0.07);
            color: #cdd6f4;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover { opacity: 0.85; }
        .btn:active { transform: scale(0.97); }

        .btn-add {
            background: linear-gradient(135deg, #89b4fa, #cba6f7);
            color: #1e1e2e;
        }

        .btn-clear {
            width: 100%;
            background: rgba(243, 139, 168, 0.15);
            color: #f38ba8;
            border: 1px solid rgba(243, 139, 168, 0.3);
            margin-top: 12px;
            padding: 10px;
            font-size: 13px;
        }

        .task-count {
            font-size: 12px;
            opacity: 0.5;
            margin-bottom: 10px;
        }

        ul { list-style: none; }

        li {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        li:hover { background: rgba(255,255,255,0.07); }

        li.done .task-text {
            text-decoration: line-through;
            opacity: 0.4;
        }

        .task-info { display: flex; flex-direction: column; flex: 1; }

        .task-text {
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .task-meta {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.45;
        }

        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .priority-high .priority-dot { background: #f38ba8; }
        .priority-medium .priority-dot { background: #fab387; }
        .priority-low .priority-dot { background: #a6e3a1; }

        .delete {
            background: none;
            border: none;
            color: rgba(243, 139, 168, 0.4);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            transition: color 0.2s;
        }

        .delete:hover { color: #f38ba8; }

        .empty {
            text-align: center;
            opacity: 0.3;
            font-size: 14px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <h1>My To-Do List</h1>
    <p class="subtitle">Stay organized, get things done.</p>

    <div class="card">
        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTask()">
            <button class="btn btn-add" onclick="addTask()">Add</button>
        </div>
        <div class="options-row">
            <input type="date" id="dateInput">
            <select id="priorityInput">
                <option value="low">Low Priority</option>
                <option value="medium" selected>Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
        </div>

        <div class="task-count" id="taskCount"></div>
        <ul id="taskList"></ul>

        <button class="btn btn-clear" onclick="clearAll()">Clear All Tasks</button>
    </div>

    <script>
        function loadTasks() {
            const tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
            tasks.forEach(task => renderTask(task));
            updateCount();
        }

        function saveTasks() {
            const items = document.querySelectorAll("li");
            const tasks = Array.from(items).map(li => ({
                text: li.querySelector(".task-text").textContent,
                date: li.querySelector(".task-meta").textContent,
                priority: li.dataset.priority,
                done: li.classList.contains("done")
            }));
            localStorage.setItem("tasks", JSON.stringify(tasks));
            updateCount();
        }

        function updateCount() {
            const total = document.querySelectorAll("li").length;
            const done = document.querySelectorAll("li.done").length;
            const el = document.getElementById("taskCount");
            if (total === 0) {
                el.textContent = "";
            } else {
                el.textContent = done + " of " + total + " completed";
            }
        }

        function renderTask(task) {
            const ul = document.getElementById("taskList");
            const empty = ul.querySelector(".empty");
            if (empty) empty.remove();

            const li = document.createElement("li");
            li.dataset.priority = task.priority;
            if (task.done) li.classList.add("done");

            li.innerHTML = `
                <div class="priority-dot"></div>
                <div class="task-info">
                    <span class="task-text" onclick="toggleDone(this)">${task.text}</span>
                    <span class="task-meta">${task.date}</span>
                </div>
                <button class="delete" onclick="deleteTask(this)">✕</button>
            `;
            ul.appendChild(li);
        }

        function addTask() {
            const input = document.getElementById("taskInput");
            const date = document.getElementById("dateInput").value;
            const priority = document.getElementById("priorityInput").value;
            const task = input.value.trim();
            if (task === "") return;

            renderTask({
                text: task,
                date: date ? "Due: " + date : "No due date",
                priority: priority,
                done: false
            });
            saveTasks();
            input.value = "";
            document.getElementById("dateInput").value = "";
            input.focus();
        }

        function toggleDone(span) {
            span.parentElement.parentElement.classList.toggle("done");
            saveTasks();
        }

        function deleteTask(button) {
            button.parentElement.remove();
            if (document.querySelectorAll("li").length === 0) {
                document.getElementById("taskList").innerHTML = '<p class="empty">No tasks yet. Add one above!</p>';
            }
            saveTasks();
        }

        function clearAll() {
            if (confirm("Clear all tasks?")) {
                document.getElementById("taskList").innerHTML = '<p class="empty">No tasks yet. Add one above!</p>';
                localStorage.removeItem("tasks");
                updateCount();
            }
        }

        loadTasks();
        if (document.querySelectorAll("li").length === 0) {
            document.getElementById("taskList").innerHTML = '<p class="empty">No tasks yet. Add one above!</p>';
        }
    </script>
</body>
</html>
